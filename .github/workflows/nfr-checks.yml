name: NFR Checks

on:
  pull_request:
    branches: [dev, staging, main]
  push:
    branches: [staging, main]

concurrency:
  group: nfr-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  NODE_VERSION: "22"

jobs:
  nfr-checks:
    name: nfr-checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build

      # ─── Bundle size budget ───────────────────────────────
      - name: Bundle size check
        run: |
          set -e
          MAIN_KB=$(du -sk dist/assets | cut -f1)
          BUDGET_KB=1500   # 1.5 MB total assets budget
          echo "Bundle: ${MAIN_KB}KB (budget: ${BUDGET_KB}KB)"
          if [ "$MAIN_KB" -gt "$BUDGET_KB" ]; then
            echo "::error::Bundle exceeds budget by $((MAIN_KB - BUDGET_KB))KB"
            exit 1
          fi

      # ─── Accessibility (axe via Playwright) ───────────────
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run a11y scan
        run: npm run test:a11y

      # ─── License / compliance check ───────────────────────
      - name: License audit
        run: npx license-checker-rseidelsohn --production --excludePackages "$(node -p "require('./package.json').name")" --failOn "GPL;AGPL;LGPL;CPAL;OSL;EUPL"
