name: E2E Tests (Nightly)

on:
  schedule:
    - cron: '0 2 * * *'   # 02:00 UTC daily
  workflow_dispatch:

env:
  NODE_VERSION: "22"

jobs:
  e2e-nightly:
    name: e2e-nightly
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E — flows
        id: flows
        continue-on-error: true
        run: npx playwright test tests/e2e/flows/ --reporter=html

      - name: E2E — smoke
        id: smoke
        continue-on-error: true
        run: npx playwright test tests/e2e/smoke/ --reporter=html

      - name: E2E — a11y
        id: a11y
        continue-on-error: true
        run: npx playwright test tests/a11y/ --reporter=html

      - name: Aggregate result
        run: |
          fail=0
          [ "${{ steps.flows.outcome }}" = "failure" ] && echo "::error::flows failed" && fail=1 || true
          [ "${{ steps.smoke.outcome }}" = "failure" ] && echo "::error::smoke failed" && fail=1 || true
          [ "${{ steps.a11y.outcome }}"  = "failure" ] && echo "::error::a11y failed"  && fail=1 || true
          exit $fail

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-nightly-report
          path: playwright-report/
          retention-days: 14

      - name: File issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date().toISOString().slice(0, 10);
            await github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title: `[Nightly] E2E suite failed — ${date}`,
              labels: ['type:bug', 'area:qa-found', 'nightly-failure'],
              body: `Nightly E2E run failed on ${context.sha.substring(0,7)}.\n\n` +
                    `Workflow: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });
