name: qa-architect dispatch

# Routes issue/PR/comment/cron events to the qa-architect skill.
# Sub-phase 2a: hello-world end-to-end. Mode bodies land in 2b-2f.
#
# This workflow ships in the starter pack's .github/ and is copied into
# consumer repos. The skill itself (prompts, dispatcher, eval) lives in
# Engineersmind/.github/skills/qa-architect/ — see SKILL.md for the
# deployment model.

on:
  # Mode 1: plan-from-ac — fires when a Story issue is opened or labeled `story`
  issues:
    types: [opened, labeled]

  # Mode 2: classify-risk-tier — fires when a PR is opened or marked ready.
  # Mode 3: propose-regression-test — fires on bug-fix PRs (label check inside).
  # Deliberately NOT listening to `labeled` here: that fires on every label
  # add (including unrelated ones like wip, needs-review), and Mode 2 would
  # re-classify every time. Slash command `/classify` covers the rare case
  # where an author wants to re-run the proposal after labeling.
  pull_request:
    types: [opened, ready_for_review]

  # Slash commands (/plan, /classify, /regression-test, /triage, /hygiene)
  issue_comment:
    types: [created]

  # Mode 5: hygiene-report — weekly cron, Mondays 06:00 UTC
  schedule:
    - cron: '0 6 * * 1'

  # Manual dispatch for smoke testing
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode to invoke'
        required: true
        type: choice
        options:
          - hello-world
          - plan-from-ac
          - classify-risk-tier
          - propose-regression-test
          - triage-failure
          - hygiene-report
      dry_run:
        description: 'Dry run (print, do not post)'
        type: boolean
        default: true

concurrency:
  group: qa-architect-${{ github.event.issue.number || github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  detect-skill-config:
    name: detect
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
      mode: ${{ steps.check.outputs.mode }}
    steps:
      - uses: actions/checkout@v4

      - id: check
        name: Detect mode + check .qa-architect/ config
        # Untrusted fields (comment.body, issue.title, label.name) flow in
        # via env vars — NEVER inline them into `run:` via ${{ }} expression
        # interpolation, since that would let comment authors inject shell.
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_ACTION: ${{ github.event.action }}
          INPUT_MODE: ${{ inputs.mode }}
          # Untrusted — treat as data, never as code
          COMMENT_BODY: ${{ github.event.comment.body }}
          LABEL_NAME: ${{ github.event.label.name }}
          EVENT_PAYLOAD_PATH: ${{ github.event_path }}
        run: |
          # Skip in template repo (no .qa-architect/ config, no application code)
          if [ ! -d .qa-architect ] && [ ! -f package.json ]; then
            echo "No .qa-architect/ config and no package.json — template repo. Skipping."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          MODE=""

          case "$EVENT_NAME" in
            issues)
              if [[ "$EVENT_ACTION" == "opened" || "$LABEL_NAME" == "story" ]]; then
                # Mode 1 fires only on `story`-labeled issues. Read labels
                # from the event payload via jq (safer than embedding JSON
                # in a shell string).
                if [ -n "$EVENT_PAYLOAD_PATH" ] && [ -f "$EVENT_PAYLOAD_PATH" ]; then
                  if jq -r '.issue.labels[].name // empty' "$EVENT_PAYLOAD_PATH" | grep -qx 'story'; then
                    MODE="plan-from-ac"
                  fi
                fi
              fi
              ;;
            pull_request)
              MODE="classify-risk-tier"
              # propose-regression-test also fires on bug-fix PRs;
              # the dispatcher handles routing if both apply.
              ;;
            issue_comment)
              # COMMENT_BODY is data — match only the leading slash command
              # token. Anything after the first whitespace is treated as
              # argument and passed through to the dispatcher (not exec'd).
              FIRST_TOKEN=$(printf '%s' "$COMMENT_BODY" | awk 'NR==1 { print $1 }')
              case "$FIRST_TOKEN" in
                "/plan")             MODE="plan-from-ac" ;;
                "/classify")         MODE="classify-risk-tier" ;;
                "/regression-test")  MODE="propose-regression-test" ;;
                "/triage")           MODE="triage-failure" ;;
                "/hygiene")          MODE="hygiene-report" ;;
              esac
              ;;
            schedule)
              MODE="hygiene-report"
              ;;
            workflow_dispatch)
              # INPUT_MODE comes from the choice input — already validated
              # by the workflow_dispatch UI to be one of the choices.
              MODE="$INPUT_MODE"
              ;;
          esac

          if [[ -z "$MODE" ]]; then
            echo "No mode matched this event. Skipping."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "should_run=true" >> "$GITHUB_OUTPUT"
          echo "::notice::qa-architect will invoke mode '$MODE' for event '$EVENT'"

  invoke:
    name: invoke
    needs: detect-skill-config
    if: needs.detect-skill-config.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      # The skill code lives in Engineersmind/.github/skills/qa-architect/.
      # For sub-phase 2a, fall back to the in-repo copy under skills/qa-architect/.
      # When the production deployment lands (sub-phase 2b first real mode),
      # this checks out the org-default repo instead.
      - name: Locate skill
        id: skill
        # 2a only supports the in-repo skill copy under skills/qa-architect/.
        # Production deployment to Engineersmind/.github/skills/qa-architect/
        # requires an explicit checkout step (lands in sub-phase 2b alongside
        # the first real mode). Until then, only the in-repo path is wired.
        run: |
          if [ -d skills/qa-architect ]; then
            echo "path=skills/qa-architect" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::qa-architect skill not found in this repo (sub-phase 2a only supports in-repo path). CI does not block — proceeding."
            echo "path=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

      - name: Invoke skill
        if: steps.skill.outputs.path != ''
        env:
          # GITHUB_EVENT_PATH and GH_TOKEN are provided automatically by the
          # Actions runner; the dispatcher reads them from the environment.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          QA_ARCHITECT_MODEL: ${{ vars.QA_ARCHITECT_MODEL }}
        run: |
          # `inputs.dry_run` only exists for the workflow_dispatch trigger.
          # For all other triggers (issues, pull_request, issue_comment,
          # schedule), this expands to an empty string and the flag is
          # never added — meaning auto-triggered runs always post for real.
          DRY_RUN_FLAG=""
          if [[ "${{ inputs.dry_run }}" == "true" ]]; then
            DRY_RUN_FLAG="--dry-run"
          fi

          ${{ steps.skill.outputs.path }}/scripts/qa-architect-dispatch.sh \
            --mode "${{ needs.detect-skill-config.outputs.mode }}" \
            $DRY_RUN_FLAG

      - name: Skill skipped (not found)
        if: steps.skill.outputs.path == ''
        run: |
          echo "qa-architect skill not available. CI does not block — proceeding."
          exit 0
