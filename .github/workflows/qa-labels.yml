name: QA Label Automation

on:
  pull_request:
    types: [labeled, unlabeled, synchronize, opened, closed]

permissions:
  contents: read
  pull-requests: write
  issues: write
  statuses: write

jobs:
  qa-label-state-machine:
    name: qa-label-state-machine
    runs-on: ubuntu-latest
    if: github.event.action == 'labeled' || github.event.action == 'unlabeled'
    steps:
      - name: Enforce label invariants
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const labels = new Set(pr.labels.map(l => l.name));
            const action = context.payload.action;
            const labelName = context.payload.label && context.payload.label.name;

            // Mutual-exclusion groups
            const qaGroup = ['qa:ready', 'qa:in-progress', 'qa:passed', 'qa:failed', 'qa:skip'];
            const uatGroup = ['uat:ready', 'uat:passed', 'uat:failed', 'uat:waived'];

            async function ensureExclusive(group, kept) {
              for (const l of group) {
                if (l !== kept && labels.has(l)) {
                  await github.rest.issues.removeLabel({
                    owner: context.repo.owner, repo: context.repo.repo,
                    issue_number: pr.number, name: l
                  }).catch(() => {});
                }
              }
            }

            if (action === 'labeled' && qaGroup.includes(labelName)) {
              await ensureExclusive(qaGroup, labelName);
            }
            if (action === 'labeled' && uatGroup.includes(labelName)) {
              await ensureExclusive(uatGroup, labelName);
            }

            // qa:passed cannot coexist with qa:failed; same for uat
            // (handled by ensureExclusive above)

            // Block uat:passed before qa:passed
            if (action === 'labeled' && labelName === 'uat:passed' && !labels.has('qa:passed') && !labels.has('qa:skip')) {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: pr.number, name: 'uat:passed'
              });
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: pr.number,
                body: '⚠️ Cannot mark `uat:passed` before `qa:passed` (or `qa:skip`). Removed the label.'
              });
            }

  auto-create-test-plan:
    name: auto-create-test-plan
    runs-on: ubuntu-latest
    if: github.event.action == 'labeled' && github.event.label.name == 'qa:ready'
    steps:
      - name: Create or link PQE Test Plan issue
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;

            // Extract ticket from branch name: feature/EM-X/EMC-NNN-...
            const m = pr.head.ref.match(/[A-Z]+-([1-9][0-9]*)/);
            const ticket = m ? `EMC-${m[1]}` : `PR-${pr.number}`;
            const title = `[Test Plan] ${ticket} — ${pr.title.replace(/^\[Story\]\s*/i, '').trim()}`;

            // Check if a test plan already exists
            const search = await github.rest.search.issuesAndPullRequests({
              q: `repo:${context.repo.owner}/${context.repo.repo} is:issue label:type:test-plan in:title "${ticket}"`
            });

            if (search.data.total_count > 0) {
              console.log(`Test plan already exists: #${search.data.items[0].number}`);
              return;
            }

            // Create new test plan from template body (synthesized minimum — full template requires manual fill)
            const body = [
              `**Parent PR:** #${pr.number}`,
              `**Ticket:** ${ticket}`,
              `**Branch:** \`${pr.head.ref}\``,
              ``,
              `_Auto-created when PR was labeled \`qa:ready\`. PQE: please fill in the exploratory checklist and UAT scenarios from the PR's AC._`,
              ``,
              `Use the **PQE Test Plan** issue template (\`.github/ISSUE_TEMPLATE/pqe-test-plan.yml\`) as the structure: charter, exploratory checklist, UAT scenarios, sign-off.`
            ].join('\n');

            const issue = await github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title, body,
              labels: ['type:test-plan', 'area:pqe']
            });

            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: pr.number,
              body: `📋 PQE Test Plan created: #${issue.data.number}`
            });

  uat-passed-status:
    name: uat-passed-status
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Set commit status from uat:* label
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const labels = new Set(pr.labels.map(l => l.name));
            let state = 'pending';
            let description = 'Awaiting UAT sign-off (label uat:passed when verified on staging)';

            if (labels.has('uat:passed') || labels.has('uat:waived')) {
              state = 'success';
              description = labels.has('uat:waived') ? 'UAT waived (Tech Lead approved)' : 'UAT passed on staging';
            } else if (labels.has('uat:failed')) {
              state = 'failure';
              description = 'UAT failed — see linked bug';
            }

            // Only enforce uat status on PRs whose base is staging or main
            if (pr.base.ref !== 'staging' && pr.base.ref !== 'main') {
              state = 'success';
              description = 'UAT not required (PR base is not staging/main)';
            }

            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner, repo: context.repo.repo,
              sha: pr.head.sha,
              state, description,
              context: 'pqe/uat-signoff'
            });

  qa-signoff-status:
    name: qa-signoff-status
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Set commit status from qa:* label
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const labels = new Set(pr.labels.map(l => l.name));
            let state = 'pending';
            let description = 'Awaiting PQE QA pass on dev (label qa:passed when verified)';

            if (labels.has('qa:passed') || labels.has('qa:skip') || labels.has('hotfix')) {
              state = 'success';
              if (labels.has('hotfix')) description = 'QA bypassed (hotfix)';
              else if (labels.has('qa:skip')) description = 'QA skipped (docs/deps or Tech Lead waived)';
              else description = 'QA passed on dev';
            } else if (labels.has('qa:failed')) {
              state = 'failure';
              description = 'QA failed — see linked bug';
            }

            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner, repo: context.repo.repo,
              sha: pr.head.sha,
              state, description,
              context: 'pqe/qa-signoff'
            });

  auto-qa-on-merge:
    name: auto-qa-on-merge
    runs-on: ubuntu-latest
    if: github.event.action == 'closed' && github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'dev'
    steps:
      - name: Apply qa:ready or qa:skip to merged PR
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const labels = new Set(pr.labels.map(l => l.name));

            // Hotfix PRs bypass QA — UAT on staging is the only manual gate
            if (labels.has('hotfix')) {
              core.info('Hotfix label present — skipping QA pull-in.');
              return;
            }

            // If PQE already touched this PR pre-merge, respect their verdict
            const qaGroup = ['qa:ready', 'qa:in-progress', 'qa:passed', 'qa:failed', 'qa:skip'];
            for (const l of qaGroup) {
              if (labels.has(l)) {
                core.info(`PR already has ${l} — leaving as-is.`);
                return;
              }
            }

            // Auto-skip eligibility: every changed file must match a safe pattern
            const filesResp = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner, repo: context.repo.repo,
              pull_number: pr.number, per_page: 100,
            });
            const files = filesResp.map(f => f.filename);

            const safePatterns = [
              /\.md$/,
              /^docs\//,
              /(^|\/)package\.json$/,
              /(^|\/)pnpm-lock\.yaml$/,
              /(^|\/)yarn\.lock$/,
              /(^|\/)package-lock\.json$/,
              /^\.github\/dependabot\.yml$/,
              /^\.gitignore$/,
              /^LICENSE$/,
              /^\.github\/CODEOWNERS$/,
            ];
            const allSafe = files.length > 0 && files.every(f => safePatterns.some(p => p.test(f)));

            const labelToApply = allSafe ? 'qa:skip' : 'qa:ready';
            const reason = allSafe
              ? `Auto-applied \`qa:skip\` — diff is docs/deps-only (${files.length} file${files.length===1?'':'s'}). Override by removing this label if QA wants to look anyway.`
              : `Auto-applied \`qa:ready\` — PR merged to \`dev\`. PQE: please run exploratory pass on the deployed \`dev\` environment, then label \`qa:passed\` or \`qa:failed\`.`;

            await github.rest.issues.addLabels({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: pr.number, labels: [labelToApply],
            });

            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: pr.number, body: `🧪 ${reason}`,
            });

  update-ticket-status:
    name: update-ticket-status
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && (github.event.action == 'closed' || github.event.action == 'labeled' || github.event.action == 'opened')
    steps:
      - name: Flip linked ticket status labels
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const labels = new Set(pr.labels.map(l => l.name));

            // Parse GitHub close keywords from PR body
            const body = pr.body || '';
            const re = /(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#(\d+)/gi;
            const linkedIssues = [...new Set([...body.matchAll(re)].map(m => parseInt(m[1])))];

            if (linkedIssues.length === 0) {
              core.info('No linked issues (no Closes #N / Fixes #N / Resolves #N in body) — skipping.');
              return;
            }

            // Derive target status
            let targetStatus = null;
            if (pr.merged) {
              if (labels.has('uat:passed') || labels.has('uat:waived')) targetStatus = 'status:uat-passed';
              else if (labels.has('uat:failed')) targetStatus = 'status:uat-failed';
              else if (labels.has('qa:passed') || labels.has('qa:skip') || labels.has('hotfix')) targetStatus = 'status:qa-passed';
              else if (labels.has('qa:failed')) targetStatus = 'status:qa-failed';
              else if (labels.has('qa:ready') || labels.has('qa:in-progress')) targetStatus = 'status:qa-ready';
            } else {
              // Open PR — ticket is in dev/review
              targetStatus = 'status:in-review';
            }

            if (!targetStatus) {
              core.info('No status transition derived — skipping.');
              return;
            }

            const statusGroup = [
              'status:in-dev', 'status:in-review', 'status:qa-ready',
              'status:qa-passed', 'status:qa-failed',
              'status:in-staging', 'status:uat-passed', 'status:uat-failed',
              'status:shipped',
            ];

            for (const num of linkedIssues) {
              try {
                const issue = await github.rest.issues.get({
                  owner: context.repo.owner, repo: context.repo.repo, issue_number: num,
                });
                const existing = issue.data.labels.map(l => l.name);

                for (const lbl of existing) {
                  if (statusGroup.includes(lbl) && lbl !== targetStatus) {
                    await github.rest.issues.removeLabel({
                      owner: context.repo.owner, repo: context.repo.repo,
                      issue_number: num, name: lbl,
                    }).catch(() => {});
                  }
                }

                if (!existing.includes(targetStatus)) {
                  await github.rest.issues.addLabels({
                    owner: context.repo.owner, repo: context.repo.repo,
                    issue_number: num, labels: [targetStatus],
                  });
                }
                core.info(`Ticket #${num} → ${targetStatus}`);
              } catch (e) {
                core.warning(`Could not update ticket #${num}: ${e.message}`);
              }
            }
