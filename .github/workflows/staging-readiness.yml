name: Staging Readiness

on:
  pull_request:
    branches: [staging]

permissions:
  contents: read
  pull-requests: read

jobs:
  staging-readiness:
    name: staging-readiness
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ─── 1. Source branch must be `dev` (hotfix override) ─────
      - name: Source branch must be dev
        run: |
          SRC="${{ github.head_ref }}"
          echo "PR source branch: $SRC"
          if [ "$SRC" != "dev" ]; then
            echo "::error::PRs into staging must come from dev (got: $SRC). Hotfixes are the only exception — open the PR with the 'hotfix' label."
            if [ "${{ contains(github.event.pull_request.labels.*.name, 'hotfix') }}" != "true" ]; then
              exit 1
            fi
            echo "Hotfix label present — allowing non-dev source."
          fi

      # ─── 2. Every PR in the promotion has qa:passed ───────────
      - name: PQE QA sign-off check
        uses: actions/github-script@v7
        with:
          script: |
            // Hotfix-labeled promotions bypass the QA enumeration (intentional, audited override)
            const labels = context.payload.pull_request.labels.map(l => l.name);
            if (labels.includes('hotfix')) {
              core.info('Hotfix label present — skipping QA enumeration.');
              return;
            }

            // Enumerate squash-merge commits inbound to staging from this PR's diff
            const { execSync } = require('child_process');
            const log = execSync('git log --oneline origin/staging..HEAD --no-merges').toString();
            const lines = log.trim().split('\n').filter(Boolean);
            // Squash commits include "(#NNN)" suffix from GitHub UI
            const prNumbers = [...new Set(
              lines.flatMap(l => [...l.matchAll(/\(#(\d+)\)/g)].map(m => parseInt(m[1])))
            )];

            if (prNumbers.length === 0) {
              core.warning('No PR numbers extracted from commit log — skipping QA enumeration. Verify squash commits include (#NNN) suffix.');
              return;
            }

            core.info(`Checking ${prNumbers.length} PRs in this promotion for qa:passed...`);
            const missing = [];

            for (const num of prNumbers) {
              try {
                const { data } = await github.rest.pulls.get({
                  owner: context.repo.owner, repo: context.repo.repo, pull_number: num
                });
                const lbls = data.labels.map(l => l.name);
                const ok = lbls.includes('qa:passed') || lbls.includes('qa:skip') || lbls.includes('hotfix');
                if (!ok) missing.push({ num, title: data.title });
              } catch (e) {
                core.warning(`Could not fetch PR #${num}: ${e.message}`);
              }
            }

            if (missing.length > 0) {
              const list = missing.map(m => `  - #${m.num}  ${m.title}`).join('\n');
              core.setFailed(
                `❌ ${missing.length} PR(s) in this promotion are missing \`qa:passed\` (or \`qa:skip\` / \`hotfix\`):\n${list}\n\n` +
                'PQE must run QA on the deployed dev environment and label each PR before dev→staging can merge.'
              );
            } else {
              core.info(`✓ All ${prNumbers.length} PRs have QA sign-off.`);
            }
