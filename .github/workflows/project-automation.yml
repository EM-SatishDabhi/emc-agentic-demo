name: Project Board Automation

# Auto-moves issue cards on the project board as branches/PRs/labels change.
# Slimmed adaptation of fylix-aicore-frontend's pattern; generalized for the
# starter kit and extended to react to the PQE label state machine.
#
# ──────────────────────────────────────────────────────────────────────────
# WIRE-UP CHECKLIST (do once per repo before enabling):
#   1. Settings → Secrets and variables → Actions → New repository secret
#        PROJECT_TOKEN  — a fine-grained PAT with `read:org`, `repo`, `project`
#                         scopes. Required because GITHUB_TOKEN cannot edit
#                         organization-level project boards.
#   2. Settings → Secrets and variables → Actions → Variables tab → New variable
#        PROJECT_NUMBER — the integer N from your project URL:
#                         github.com/orgs/<org>/projects/<N>
#        TICKET_PREFIX  — your ticket prefix, e.g. "EMC" (default if unset)
#   3. Make sure the project's Status field has options that include the
#      strings "In Progress", "In Review", "In QA", "QA Passed", "Done"
#      (case-insensitive substring match). Customize the option-matching
#      block below if your column names differ.
#
#   NOTE: QA happens AFTER merge to dev (not before). Merge moves the card to
#   "In QA"; PQE applies qa:passed to advance to "QA Passed"; uat:passed
#   moves to "Done" after staging UAT.
# ──────────────────────────────────────────────────────────────────────────

on:
  create:
  pull_request:
    types: [opened, closed, labeled]

env:
  ORG: ${{ github.repository_owner }}

jobs:
  branch-created:
    if: github.event_name == 'create' && github.event.ref_type == 'branch' && github.actor != 'dependabot[bot]'
    name: Move card → In Progress on branch create
    runs-on: ubuntu-latest
    steps:
      - name: Extract ticket from branch name
        id: extract
        run: |
          BRANCH="${{ github.event.ref }}"
          PREFIX="${{ vars.TICKET_PREFIX || 'EMC' }}"
          # Match {PREFIX}-N or #N — branch like feature/EM-X/EMC-125-foo → 125
          ISSUE=$(echo "$BRANCH" | grep -oE "(${PREFIX}-|#)[0-9]+" | head -1 | grep -oE '[0-9]+')
          if [ -z "$ISSUE" ]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No ticket pattern in branch: $BRANCH"
          else
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "issue=$ISSUE" >> "$GITHUB_OUTPUT"
            echo "Found issue #$ISSUE"
          fi

      - name: Skip if PROJECT_TOKEN not configured
        id: token
        if: steps.extract.outputs.found == 'true'
        run: |
          if [ -z "$T" ]; then
            echo "::warning::PROJECT_TOKEN not set — skipping board update."
            echo "ok=false" >> "$GITHUB_OUTPUT"
          else
            echo "ok=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          T: ${{ secrets.PROJECT_TOKEN }}

      - name: Set issue to "In Progress"
        if: steps.extract.outputs.found == 'true' && steps.token.outputs.ok == 'true'
        uses: actions/github-script@v7
        env:
          ISSUE_NUMBER: ${{ steps.extract.outputs.issue }}
          PROJECT_NUMBER: ${{ vars.PROJECT_NUMBER }}
        with:
          github-token: ${{ secrets.PROJECT_TOKEN }}
          script: |
            const status = require('./.github/workflows/scripts/move-card.js');
            await status({ github, context, status: 'In Progress' });
        continue-on-error: true   # don't fail the workflow if the script is missing

  pr-opened:
    if: github.event_name == 'pull_request' && github.event.action == 'opened'
    name: Move card → In Review on PR open
    runs-on: ubuntu-latest
    steps:
      - name: Move associated issue → In Review
        if: vars.PROJECT_NUMBER != ''
        uses: actions/github-script@v7
        env:
          PROJECT_NUMBER: ${{ vars.PROJECT_NUMBER }}
          PREFIX: ${{ vars.TICKET_PREFIX || 'EMC' }}
        with:
          github-token: ${{ secrets.PROJECT_TOKEN }}
          script: |
            // Extract ticket from PR title or branch
            const pr = context.payload.pull_request;
            const text = `${pr.title} ${pr.head.ref}`;
            const m = text.match(new RegExp(`(${process.env.PREFIX}-|#)([0-9]+)`));
            if (!m) { core.info('No ticket pattern in PR title or branch'); return; }
            core.info(`Moving issue #${m[2]} → In Review`);
            // GraphQL mutation lives in the helper script (see project-automation/scripts/)
            // For brevity here we only log; uncomment the real call when scripts/ is in place.
            // await require('./.github/workflows/scripts/move-card.js')({ github, context, issueNumber: m[2], status: 'In Review' });

  pr-merged-to-dev:
    if: |
      github.event_name == 'pull_request' &&
      github.event.action == 'closed' &&
      github.event.pull_request.merged &&
      github.event.pull_request.base.ref == 'dev'
    name: Move card → In QA on merge to dev
    runs-on: ubuntu-latest
    steps:
      - name: Move associated issue → In QA
        if: vars.PROJECT_NUMBER != ''
        uses: actions/github-script@v7
        env:
          PROJECT_NUMBER: ${{ vars.PROJECT_NUMBER }}
          PREFIX: ${{ vars.TICKET_PREFIX || 'EMC' }}
        with:
          github-token: ${{ secrets.PROJECT_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            const text = `${pr.title} ${pr.head.ref}`;
            const m = text.match(new RegExp(`(${process.env.PREFIX}-|#)([0-9]+)`));
            if (!m) { core.info('No ticket pattern'); return; }
            // Hotfixes skip QA — go straight to Done-pending-UAT
            const labels = pr.labels.map(l => l.name);
            const target = labels.includes('hotfix') ? 'Done' : 'In QA';
            core.info(`Moving issue #${m[2]} → ${target}`);

  qa-passed:
    if: |
      github.event_name == 'pull_request' &&
      github.event.action == 'labeled' &&
      (github.event.label.name == 'qa:passed' || github.event.label.name == 'qa:skip')
    name: Move card → QA Passed
    runs-on: ubuntu-latest
    steps:
      - name: Move associated issue → QA Passed
        if: vars.PROJECT_NUMBER != ''
        uses: actions/github-script@v7
        env:
          PROJECT_NUMBER: ${{ vars.PROJECT_NUMBER }}
          PREFIX: ${{ vars.TICKET_PREFIX || 'EMC' }}
        with:
          github-token: ${{ secrets.PROJECT_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            const text = `${pr.title} ${pr.head.ref}`;
            const m = text.match(new RegExp(`(${process.env.PREFIX}-|#)([0-9]+)`));
            if (!m) { core.info('No ticket pattern'); return; }
            core.info(`Moving issue #${m[2]} → QA Passed`);

  uat-passed:
    if: |
      github.event_name == 'pull_request' &&
      github.event.action == 'labeled' &&
      (github.event.label.name == 'uat:passed' || github.event.label.name == 'uat:waived')
    name: Move card → Done on uat:passed
    runs-on: ubuntu-latest
    steps:
      - name: Move associated issue → Done
        if: vars.PROJECT_NUMBER != ''
        uses: actions/github-script@v7
        env:
          PROJECT_NUMBER: ${{ vars.PROJECT_NUMBER }}
          PREFIX: ${{ vars.TICKET_PREFIX || 'EMC' }}
        with:
          github-token: ${{ secrets.PROJECT_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            const text = `${pr.title} ${pr.head.ref}`;
            const m = text.match(new RegExp(`(${process.env.PREFIX}-|#)([0-9]+)`));
            if (!m) { core.info('No ticket pattern'); return; }
            core.info(`Moving issue #${m[2]} → Done`);

# ──────────────────────────────────────────────────────────────────────────
# IMPLEMENTATION NOTE
# ──────────────────────────────────────────────────────────────────────────
# The actual ProjectV2 GraphQL mutations are lengthy. The full reference
# implementation (~400 lines of typed mutations) lives in the original at:
#   Engineersmind/fylix-aicore-frontend/.github/workflows/project-automation.yml
#
# Drop a `.github/workflows/scripts/move-card.js` helper that exposes:
#   module.exports = async ({ github, context, issueNumber, status }) => { ... }
#
# Adapted from fylix's inline GraphQL — single source of truth for the
# Status-field lookup, board membership check, and field-value update.
