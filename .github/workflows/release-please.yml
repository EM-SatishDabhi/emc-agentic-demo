name: Release Please

# Automated release management — parses conventional commits on `main` and
# maintains a long-lived "Release PR" with the next version + CHANGELOG entries.
# Merging the Release PR cuts the actual release.
#
# Pairs with release-readiness.yml (which gates the staging→main promotion).
# Sequence in practice:
#   1. PRs land in dev with conventional commits (feat:, fix:, etc.)
#   2. dev → staging (PQE UAT happens — Step 12b)
#   3. staging → main — release-readiness gates on uat:passed
#   4. release-please opens / updates a Release PR with the bump
#   5. Merging the Release PR creates the GitHub Release + tag

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          # Change to "python" / "go" / "java" / "simple" per your stack.
          # See: https://github.com/googleapis/release-please/blob/main/docs/manifest-releaser.md
          release-type: node
          target-branch: main
          changelog-types: >
            [
              {"type": "feat",     "section": "Features",      "hidden": false},
              {"type": "fix",      "section": "Bug Fixes",     "hidden": false},
              {"type": "perf",     "section": "Performance",   "hidden": false},
              {"type": "refactor", "section": "Refactoring",   "hidden": false},
              {"type": "test",     "section": "Tests",         "hidden": false},
              {"type": "docs",     "section": "Documentation", "hidden": false},
              {"type": "ci",       "section": "CI/CD",         "hidden": false},
              {"type": "chore",    "section": "Maintenance",   "hidden": true},
              {"type": "style",    "section": "Styles",        "hidden": true}
            ]
