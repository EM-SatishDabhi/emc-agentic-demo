name: CodeQL

on:
  pull_request:
    branches: [dev, staging, main]
  push:
    branches: [main]
  schedule:
    - cron: "0 7 * * 1"  # Mondays 07:00 UTC

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Preflight: skip CodeQL when running in a repo with no application code
  # (e.g. this starter-pack template itself). Consumer repos with a real
  # package.json proceed normally.
  detect:
    name: detect
    runs-on: ubuntu-latest
    outputs:
      has_app_code: ${{ steps.check.outputs.has_app_code }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        name: Check for application code
        run: |
          if [ -f package.json ]; then
            echo "has_app_code=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_app_code=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No package.json at repo root — treating as template repo, skipping CodeQL scan."
          fi

  CodeQL:
    name: CodeQL
    needs: detect
    if: needs.detect.outputs.has_app_code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          config-file: ./.github/codeql.yml

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
